<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LingoFast PWA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ffffff">
    <style>
        .split-top { transform: rotate(180deg); }
        .grid-dynamic { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.5rem; }
        .panel-double { display: flex; flex-direction: column; gap: 2px; }
        .safe-area { padding-top: env(safe-area-inset-top); }
    </style>
</head>
<body class="bg-white text-black font-sans overflow-hidden h-screen flex flex-col">

    <!-- Header / Translation Banner -->
    <div id="banner" class="h-20 bg-gray-100 flex items-center justify-center text-xl font-bold border-b text-center px-4">
        Appuyez sur un bouton
    </div>

    <!-- Mode Selector & Settings -->
    <div class="flex justify-between p-2 bg-white border-b text-sm">
        <select id="langTarget" class="border rounded p-1">
            <option value="en">🇬🇧 EN</option>
            <option value="fr" selected>🇫🇷 FR</option>
            <option value="de">🇩🇪 DE</option>
            <option value="it">🇮🇹 IT</option>
            <option value="es">🇪🇸 ES</option>
            <option value="pl">🇵🇱 PL</option>
            <option value="ar">🇸🇦 AR</option>
            <option value="fa">🇮🇷 FA</option>
            <option value="da">🇦🇫 DA</option>
        </select>
        <button onclick="toggleMode()" class="bg-blue-500 text-white px-3 py-1 rounded">Mode Split</button>
        <button onclick="toggleLatin()" id="latinBtn" class="border px-3 py-1 rounded hidden">ABC</button>
    </div>

    <!-- Main Content Area -->
    <main id="appContent" class="flex-1 overflow-y-auto p-2">
        <div id="grid" class="grid-dynamic"></div>
    </main>

    <!-- Suggestions Bar -->
    <div id="suggestions" class="h-16 bg-gray-50 border-t flex items-center justify-around px-2">
        <!-- Rempli par JS -->
    </div>

    <script>
        const DATA = {
            "oui": { fr: "Oui", en: "Yes", de: "Ja", it: "Sì", es: "Sí", pl: "Tak", ar: "نعم", ar_l: "Na'am", fa: "بله", fa_l: "Baleh", da: "بلی", da_l: "Bali" },
            "non": { fr: "Non", en: "No", de: "Nein", it: "No", es: "No", pl: "Nie", ar: "لا", ar_l: "La", fa: "نه", fa_l: "Na", da: "نه", da_l: "Na" },
            "toilet": { fr: "Où sont les toilettes ?", en: "Where is the toilet?", de: "Wo ist die Toilette?", it: "Dove sono i bagni?", es: "¿Dónde está el baño?", pl: "Gdzie jest toaleta?", ar: "أين المرحاض؟", ar_l: "Ayna al-mirhad?", fa: "دستشویی کجاست؟", fa_l: "Dastshui kojast?", da: "تشناب کجاست؟", da_l: "Tashnab kojast?" },
            // ... Ajoutez ici le reste de la liste fournie sur le même schéma
        };

        const pairs = [["oui", "non"], ["toilet", "bonjour"]]; // Exemple de structure
        let currentLang = 'fr';
        let useLatin = false;
        let isSplit = false;

        function render() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            
            Object.keys(DATA).forEach(key => {
                const btn = document.createElement('button');
                btn.className = "h-24 bg-gray-50 border-2 border-black rounded-lg text-lg font-semibold active:bg-blue-100 transition-colors";
                btn.innerText = DATA[key].fr;
                btn.onclick = () => speakAndTranslate(key);
                grid.appendChild(btn);
            });
        }

        function speakAndTranslate(key) {
            const target = document.getElementById('langTarget').value;
            const text = (useLatin && DATA[key][target+'_l']) ? DATA[key][target+'_l'] : DATA[key][target];
            
            document.getElementById('banner').innerText = text;
            
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = target;
            window.speechSynthesis.speak(msg);

            // Suggestions simples (logique de démo)
            updateSuggestions(key);
        }

        function updateSuggestions(key) {
            const suggCont = document.getElementById('suggestions');
            suggCont.innerHTML = '<span class="text-xs text-gray-400">Suggestions:</span>';
            // Logique simplifiée pour l'exemple
            ["merci", "au revoir"].forEach(s => {
                const b = document.createElement('button');
                b.className = "text-sm bg-white border rounded px-2 py-1";
                b.innerText = DATA[s].fr;
                b.onclick = () => speakAndTranslate(s);
                suggCont.appendChild(b);
            });
        }

        function toggleMode() {
            isSplit = !isSplit;
            document.getElementById('appContent').classList.toggle('flex-col');
            // Logique de duplication de vue ici pour le Split Screen
            alert(isSplit ? "Mode Split activé" : "Mode Solo");
        }

        function toggleLatin() {
            useLatin = !useLatin;
            render();
        }

        document.getElementById('langTarget').onchange = (e) => {
            const val = e.target.value;
            document.getElementById('latinBtn').classList.toggle('hidden', !['ar', 'fa', 'da'].includes(val));
        };

        window.onload = render;
        if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
    </script>
</body>
</html>
